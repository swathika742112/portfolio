<svg viewBox="0 0 100 110" xmlns="http://www.w3.org/2000/svg" fill="none">
  <defs>
    <!-- Blue → Cyan gradient -->
    <linearGradient id="blueG" x1="0" y1="0" x2="80" y2="55" gradientUnits="userSpaceOnUse">
      <stop stop-color="#1e40af"/>
      <stop offset="1" stop-color="#06b6d4"/>
    </linearGradient>
    <!-- Orange → Red gradient -->
    <linearGradient id="orangeG" x1="100" y1="55" x2="20" y2="110" gradientUnits="userSpaceOnUse">
      <stop stop-color="#f97316"/>
      <stop offset="1" stop-color="#dc2626"/>
    </linearGradient>
    <!-- Clip: top half of S -->
    <clipPath id="topClip">
      <rect x="0" y="0" width="100" height="55"/>
    </clipPath>
    <!-- Clip: bottom half of S -->
    <clipPath id="botClip">
      <rect x="0" y="55" width="100" height="55"/>
    </clipPath>
    <!-- Subtle background glow only (not on shapes) -->
    <filter id="bgGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="10"/>
    </filter>
  </defs>

  <!-- ── Soft background glow blobs (behind everything) ── -->
  <ellipse cx="40" cy="38" rx="28" ry="32" fill="#1d4ed8" opacity="0.18" filter="url(#bgGlow)"/>
  <ellipse cx="58" cy="80" rx="24" ry="22" fill="#f97316"  opacity="0.22" filter="url(#bgGlow)"/>

  <!-- ── S letterform path (drawn twice, clipped to top/bottom) ── -->
  <!-- The S path: starts top-right, curves left, middle crossover, ends bottom-left -->
  <path
    clip-path="url(#topClip)"
    d="M68 20 C68 12 60 8 50 8 C36 8 22 15 22 29 C22 43 38 48 52 53 C62 57 76 62 78 74"
    stroke="url(#blueG)"
    stroke-width="17"
    stroke-linecap="round"
    fill="none"
  />
  <path
    clip-path="url(#botClip)"
    d="M22 29 C22 43 38 48 52 53 C66 58 78 64 78 78 C78 92 64 101 50 101 C36 101 22 95 22 86"
    stroke="url(#orangeG)"
    stroke-width="17"
    stroke-linecap="round"
    fill="none"
  />

  <!-- ── Tech circuit dots (right side, sharp — no blur) ── -->
  <!-- Top dot: cyan -->
  <circle cx="87" cy="24" r="4.5" fill="#06b6d4"/>
  <!-- Mid dot: cyan (slightly larger) -->
  <circle cx="92" cy="47" r="5.5" fill="#06b6d4" opacity="0.75"/>
  <!-- Bottom dot: orange -->
  <circle cx="88" cy="70" r="4"   fill="#f97316"/>

  <!-- Connector lines between dots -->
  <line x1="87" y1="29" x2="88" y2="41" stroke="#06b6d4" stroke-width="1.5" opacity="0.45" stroke-linecap="round"/>
  <line x1="90" y1="53" x2="89" y2="65" stroke="#06b6d4" stroke-width="1.5" opacity="0.35" stroke-linecap="round"/>
</svg>
